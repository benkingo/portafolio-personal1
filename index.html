<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio de Benjamin Salinas Muñoz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="marca">
                <div class="logo">BS</div>
                <span>Benjamin Salinas Muñoz</span>
            </div>

            <div class="navlinks">
                <a href="#sobre-mi">Sobre mí</a>
                <a href="#habilidades">Habilidades</a>
                <a href="#proyectos">Proyectos</a>
                <a href="#contacto">Contacto</a>
            </div>
        </nav>
    </header>

    <main>
        <section class="presentacion">
            <div class="texto-presentacion">
                <h1>Hola, soy <span>Benjamin Salinas Muñoz</span></h1>
            </div>

            <div class="foto-presentacion">
                <div class="circulo-foto">BS</div>
            </div>
        </section>

        <section id="sobre-mi">
            <h2>Sobre mí</h2>
        </section>

        <section id="habilidades">
            <h2>Habilidades</h2>
        </section>

        <section id="proyectos">
            <h2>Proyectos</h2>
        </section>

        <section id="contacto">
            <h2>Contacto</h2>
        </section>
    </main>

</body>
</html>
